          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site/

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # ──────────────────────────────────────────────
  # POST-RELEASE: SYNC MIRRORS
  # ──────────────────────────────────────────────
  sync-mirrors:
    name: Sync Mirrors
    runs-on: ubuntu-latest
    needs: [publish-release]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: release/

      - name: Sync to mirror servers
        run: |
          chmod +x scripts/cli/moonci
          ./scripts/cli/moonci mirror-sync \
            --version=${{ env.MOON_OS_VERSION }} \
            --artifacts=release/ || echo "Mirror sync skipped (no credentials)"
        env:
          MIRROR_SSH_KEY: ${{ secrets.MIRROR_SSH_KEY }}
          MIRROR_HOST: ${{ secrets.MIRROR_HOST }}
