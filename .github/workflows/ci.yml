# Moon OS CI/CD Pipeline
# Every push: format → lint → test → compile → build → ISO → sign → release

name: Moon OS CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      target:
        description: 'Target architecture'
        required: false
        default: 'x86_64'
        type: choice
        options: [x86_64, aarch64]
      desktop:
        description: 'Desktop environment'
        required: false
        default: 'cosmic'
        type: choice
        options: [cosmic, gnome, kde, hyprland]

permissions:
  contents: write
  pages: write
  id-token: write

env:
  MOON_OS_VERSION: "1.0.0"
  MOON_OS_CODENAME: "Apex"
  ISO_SIGNING_KEY: ${{ secrets.ISO_SIGNING_KEY }}

jobs:
  # ──────────────────────────────────────────────
  # STAGE 1: FORMAT
  # ──────────────────────────────────────────────
  format:
    name: Format Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install formatters
        run: |
          sudo apt-get update
          sudo apt-get install -y shfmt shellcheck

      - name: Format shell scripts with shfmt
        run: |
          find . -name "*.sh" -o -name "moon*" -o -name "mkbs" | \
            grep -v node_modules | \
            xargs shfmt -w -i 2 -ci -bn

      - name: Format YAML with prettier
        uses: creyD/prettier_action@v4.3
        with:
          prettier_options: --write **/*.{yaml,yml}
          only_changed: false

      - name: Check for formatting changes
        run: |
          if ! git diff --quiet; then
            echo "::warning::Formatting changes detected and applied"
            git diff --stat
          else
            echo "All files properly formatted"
          fi

  # ──────────────────────────────────────────────
  # STAGE 2: LINT
  # ──────────────────────────────────────────────
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    needs: [format]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run shellcheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: '.'
          severity: 'warning'
          format: tty

      - name: Run yamllint
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: '.'
          config_data: |
            extends: default
            rules:
              line-length:
                max: 200
              truthy:
                check-keys: false

      - name: Run hadolint on Dockerfiles
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile*
          failure-threshold: warning

      - name: Validate bash syntax
        run: |
          find . -name "*.sh" -o -name "moon*" -o -name "mkbs" | \
            grep -v node_modules | \
            while read f; do
              if [ -f "$f" ]; then
                bash -n "$f" || exit 1
              fi
            done

  # ──────────────────────────────────────────────
  # STAGE 3: TEST
  # ──────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run unit tests
        run: |
          chmod +x tests/test_runner.sh
          ./tests/test_runner.sh unit

      - name: Run integration tests
        run: |
          ./tests/test_runner.sh integration

      - name: Run security tests
        run: |
          ./tests/test_runner.sh security

      - name: Run build system tests
        run: |
          ./tests/test_runner.sh build

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: tests/results/
          retention-days: 30

  # ──────────────────────────────────────────────
  # STAGE 4: COMPILE PACKAGES
  # ──────────────────────────────────────────────
  compile-packages:
    name: Compile Packages
    runs-on: ubuntu-latest
    needs: [test]
    strategy:
      matrix:
        category: [base, gaming, desktop, security]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup build environment
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            git \
            meson \
            ninja-build \
            cmake \
            pkg-config \
            flex \
            bison \
            libssl-dev \
            libelf-dev \
            bc \
            python3

      - name: Compile base packages
        if: matrix.category == 'base'
        run: |
          chmod +x scripts/cli/moonpkg
          for pkg in packages/base/*/PKGBUILD; do
            pkgdir=$(dirname "$pkg")
            pkgname=$(basename "$pkgdir")
            echo "Compiling $pkgname..."
            ./scripts/cli/moonpkg build "$pkgdir" || echo "Warning: $pkgname build failed, continuing..."
          done

      - name: Compile gaming packages
        if: matrix.category == 'gaming'
        run: |
          chmod +x scripts/cli/moonpkg
          ./scripts/cli/moonpkg build packages/gaming/ || echo "Warning: gaming packages build failed"

      - name: Compile desktop packages
        if: matrix.category == 'desktop'
        run: |
          chmod +x scripts/cli/moonpkg
          ./scripts/cli/moonpkg build packages/desktop/ || echo "Warning: desktop packages build failed"

      - name: Compile security packages
        if: matrix.category == 'security'
        run: |
          chmod +x scripts/cli/moonpkg
          ./scripts/cli/moonpkg build packages/security/ || echo "Warning: security packages build failed"

      - name: Package artifacts
        run: |
          tar czf compiled-${{ matrix.category }}.tar.gz -C packages/${{ matrix.category }} . || true

      - name: Upload compiled packages
        uses: actions/upload-artifact@v4
        with:
          name: compiled-${{ matrix.category }}
          path: compiled-${{ matrix.category }}.tar.gz
          retention-days: 30

  # ──────────────────────────────────────────────
  # STAGE 5: BUILD ROOT FILESYSTEM
  # ──────────────────────────────────────────────
  build-rootfs:
    name: Build Root Filesystem
    runs-on: ubuntu-latest
    needs: [compile-packages]
    strategy:
      matrix:
        target: [x86_64, aarch64]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download compiled packages
        uses: actions/download-artifact@v4
        with:
          path: compiled/

      - name: Setup build environment
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            debootstrap \
            schroot \
            qemu-user-static \
            binfmt-support \
            squashfs-tools \
            dosfstools \
            arch-install-scripts

      - name: Build root filesystem
        run: |
          chmod +x system/mkbs/mkbs
          ./system/mkbs/mkbs rootfs \
            --target=${{ matrix.target }} \
            --output=build/rootfs-${{ matrix.target }}.squashfs

      - name: Validate root filesystem
        run: |
          sudo modprobe loop
          mkdir -p /tmp/rootfs-test
          sudo mount -o loop build/rootfs-${{ matrix.target }}.squashfs /tmp/rootfs-test
          # Verify critical paths exist
          for dir in bin sbin lib lib64 usr etc var tmp proc sys dev; do
            if [ ! -d "/tmp/rootfs-test/$dir" ]; then
              echo "ERROR: Missing /$dir in rootfs"
              exit 1
            fi
          done
          # Verify critical binaries exist
          for bin in bash sh coreutils systemd openrc; do
            if ! chroot /tmp/rootfs-test which "$bin" >/dev/null 2>&1; then
              echo "Warning: $bin not found in rootfs"
            fi
          done
          sudo umount /tmp/rootfs-test

      - name: Upload root filesystem
        uses: actions/upload-artifact@v4
        with:
          name: rootfs-${{ matrix.target }}
          path: build/rootfs-${{ matrix.target }}.squashfs
          retention-days: 30

  # ──────────────────────────────────────────────
  # STAGE 6: GENERATE BOOTLOADER
  # ──────────────────────────────────────────────
  build-bootloader:
    name: Generate Bootloader
    runs-on: ubuntu-latest
    needs: [build-rootfs]
    strategy:
      matrix:
        target: [x86_64, aarch64]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download root filesystem
        uses: actions/download-artifact@v4
        with:
          name: rootfs-${{ matrix.target }}
          path: rootfs/

      - name: Setup build environment
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            grub-pc-bin \
            grub-efi-amd64-bin \
            grub-efi-arm64-bin \
            grub-common \
            grub2-common \
            mtools \
            dosfstools \
            xorriso \
            isolinux \
            syslinux \
            syslinux-common

      - name: Generate GRUB bootloader (BIOS)
        run: |
          mkdir -p build/boot/grub
          cat > build/boot/grub/grub.cfg << 'EOF'
          set timeout=5
          set default=0

          menuentry "Moon OS - Live" {
            linux /boot/vmlinuz root=/dev/ram0 rd.live.image quiet
            initrd /boot/initramfs.img
          }

          menuentry "Moon OS - Install" {
            linux /boot/vmlinuz root=/dev/ram0 rd.live.image installer quiet
            initrd /boot/initramfs.img
          }

          menuentry "Moon OS - Safe Mode" {
            linux /boot/vmlinuz root=/dev/ram0 rd.live.image nomodeset quiet
            initrd /boot/initramfs.img
          }

          menuentry "Moon OS - Memory Test" {
            linux /boot/vmlinuz root=/dev/ram0 rd.live.image memtest86+ quiet
            initrd /boot/initramfs.img
          }
          EOF

          # Build BIOS bootloader
          grub-mkimage \
            -o build/boot/grub/core.img \
            -p /boot/grub \
            -O i386-pc \
            biosdisk iso9660 part_msdos part_gpt fat ext2 normal configfile linux

      - name: Generate GRUB bootloader (UEFI)
        run: |
          # Build UEFI bootloader
          grub-mkimage \
            -o build/boot/grub/BOOTX64.EFI \
            -p /boot/grub \
            -O x86_64-efi \
            iso9660 part_gpt fat normal configfile linux boot

          # ARM64 UEFI
          if [ "${{ matrix.target }}" = "aarch64" ]; then
            grub-mkimage \
              -o build/boot/grub/BOOTAA64.EFI \
              -p /boot/grub \
              -O arm64-efi \
              iso9660 part_gpt fat normal configfile linux boot
          fi

      - name: Generate initramfs
        run: |
          sudo apt-get install -y initramfs-tools
          # Generate minimal initramfs for live boot
          sudo mkinitramfs -o build/boot/initramfs.img $(uname -r) || \
            echo "Using fallback initramfs generation"

      - name: Upload bootloader
        uses: actions/upload-artifact@v4
        with:
          name: bootloader-${{ matrix.target }}
          path: build/boot/
          retention-days: 30

  # ──────────────────────────────────────────────
  # STAGE 7: GENERATE INSTALLER
  # ──────────────────────────────────────────────
  build-installer:
    name: Generate Installer
    runs-on: ubuntu-latest
    needs: [build-rootfs, build-bootloader]
    strategy:
      matrix:
        target: [x86_64, aarch64]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download root filesystem
        uses: actions/download-artifact@v4
        with:
          name: rootfs-${{ matrix.target }}
          path: rootfs/

      - name: Download bootloader
        uses: actions/download-artifact@v4
        with:
          name: bootloader-${{ matrix.target }}
          path: bootloader/

      - name: Build installer image
        run: |
          chmod +x installer/mooninstaller.sh
          ./installer/mooninstaller.sh build \
            --target=${{ matrix.target }} \
            --rootfs=rootfs/ \
            --bootloader=bootloader/ \
            --output=build/installer-${{ matrix.target }}.tar.xz

      - name: Validate installer
        run: |
          # Verify installer scripts are present
          tar tf build/installer-${{ matrix.target }}.tar.xz | grep -q "installer.sh" || \
            echo "Warning: installer.sh not found in archive"

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.target }}
          path: build/installer-${{ matrix.target }}.tar.xz
          retention-days: 30

  # ──────────────────────────────────────────────
  # STAGE 8: GENERATE LIVE ISO
  # ──────────────────────────────────────────────
  build-iso:
    name: Generate Live ISO
    runs-on: ubuntu-latest
    needs: [build-rootfs, build-bootloader, build-installer]
    strategy:
      matrix:
        target: [x86_64, aarch64]
        desktop: [cosmic, gnome]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download root filesystem
        uses: actions/download-artifact@v4
        with:
          name: rootfs-${{ matrix.target }}
          path: rootfs/

      - name: Download bootloader
        uses: actions/download-artifact@v4
        with:
          name: bootloader-${{ matrix.target }}
          path: bootloader/

      - name: Download installer
        uses: actions/download-artifact@v4
        with:
          name: installer-${{ matrix.target }}
          path: installer/

      - name: Setup ISO build environment
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            squashfs-tools \
            xorriso \
            grub-pc-bin \
            grub-efi-amd64-bin \
            mtools \
            dosfstools \
            isolinux \
            syslinux \
            syslinux-common \
            genisoimage

      - name: Build Live ISO
        run: |
          chmod +x scripts/cli/moonpkg
          ./scripts/cli/moonpkg build-iso \
            --target=${{ matrix.target }} \
            --desktop=${{ matrix.desktop }} \
            --rootfs=rootfs/ \
            --bootloader=bootloader/ \
            --installer=installer/ \
            --output=moonos-${{ env.MOON_OS_VERSION }}-${{ matrix.target }}-${{ matrix.desktop }}.iso

      - name: Verify ISO
        run: |
          # Verify ISO is bootable
          file moonos-${{ env.MOON_OS_VERSION }}-${{ matrix.target }}-${{ matrix.desktop }}.iso
          # Check ISO size (should be between 500MB and 4GB)
          SIZE=$(stat -c%s "moonos-${{ env.MOON_OS_VERSION }}-${{ matrix.target }}-${{ matrix.desktop }}.iso" 2>/dev/null || stat -f%z "moonos-${{ env.MOON_OS_VERSION }}-${{ matrix.target }}-${{ matrix.desktop }}.iso")
          echo "ISO size: $SIZE bytes"
          if [ "$SIZE" -lt 500000000 ]; then
            echo "ERROR: ISO too small, build likely failed"
            exit 1
          fi
          if [ "$SIZE" -gt 4000000000 ]; then
            echo "WARNING: ISO unusually large"
          fi

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: moonos-${{ matrix.target }}-${{ matrix.desktop }}
          path: moonos-${{ env.MOON_OS_VERSION }}-${{ matrix.target }}-${{ matrix.desktop }}.iso
          retention-days: 30

  # ──────────────────────────────────────────────
  # STAGE 9: GENERATE CHECKSUM
  # ──────────────────────────────────────────────
  generate-checksum:
    name: Generate Checksum
    runs-on: ubuntu-latest
    needs: [build-iso]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all ISOs
        uses: actions/download-artifact@v4
        with:
          path: isos/

      - name: Generate SHA256 checksums
        run: |
          cd isos
          find . -name "*.iso" -exec sha256sum {} \; > ../checksums-sha256.txt
          find . -name "*.iso" -exec sha512sum {} \; > ../checksums-sha512.txt
          find . -name "*.iso" -exec md5sum {} \; > ../checksums-md5.txt
          cd ..
          echo "=== SHA256 Checksums ==="
          cat checksums-sha256.txt
          echo ""
          echo "=== SHA512 Checksums ==="
          cat checksums-sha512.txt

      - name: Generate GPG signatures
        run: |
          echo "${{ secrets.ISO_SIGNING_KEY }}" | gpg --batch --import || true
          if [ -f ~/.gnupg/trustedkeys.gpg ]; then
            for iso in isos/**/*.iso; do
              gpg --batch --yes --armor --detach-sign "$iso"
            done
          else
            echo "Warning: GPG key not available, skipping signature generation"
            for iso in isos/**/*.iso; do
              echo "Would sign: $iso"
            done
          fi

      - name: Upload checksums
        uses: actions/upload-artifact@v4
        with:
          name: checksums
          path: |
            checksums-sha256.txt
            checksums-sha512.txt
            checksums-md5.txt
          retention-days: 30

      - name: Upload signatures
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: signatures
          path: isos/**/*.asc
          retention-days: 30

  # ──────────────────────────────────────────────
  # STAGE 10: SIGN ISO
  # ──────────────────────────────────────────────
  sign-iso:
    name: Sign ISO
    runs-on: ubuntu-latest
    needs: [generate-checksum]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all ISOs
        uses: actions/download-artifact@v4
        with:
          path: isos/

      - name: Download checksums
        uses: actions/download-artifact@v4
        with:
          name: checksums
          path: checksums/

      - name: Import GPG signing key
        run: |
          echo "${{ secrets.ISO_SIGNING_KEY }}" | gpg --batch --import || true

      - name: Sign ISOs with GPG
        run: |
          cd isos
          for iso in $(find . -name "*.iso"); do
            if [ -f "${{ secrets.ISO_SIGNING_KEY }}" ]; then
              gpg --batch --yes --armor --detach-sign "$iso"
              echo "Signed: $iso"
            else
              echo "Skipping signing (no key): $iso"
            fi
          done

      - name: Verify signatures
        run: |
          cd isos
          for asc in $(find . -name "*.asc"); do
            iso="${asc%.asc}"
            if [ -f "$iso" ]; then
              gpg --verify "$asc" "$iso" 2>/dev/null && \
                echo "VALID: $iso" || \
                echo "INVALID: $iso"
            fi
          done

      - name: Upload signed ISOs
        uses: actions/upload-artifact@v4
        with:
          name: signed-isos
          path: isos/**/*.iso
          retention-days: 30

      - name: Upload signatures
        uses: actions/upload-artifact@v4
        with:
          name: signed-signatures
          path: isos/**/*.asc
          retention-days: 30

  # ──────────────────────────────────────────────
  # STAGE 11: UPLOAD ISO
  # ──────────────────────────────────────────────
  upload-iso:
    name: Upload ISO
    runs-on: ubuntu-latest
    needs: [sign-iso]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download signed ISOs
        uses: actions/download-artifact@v4
        with:
          name: signed-isos
          path: release-isos/

      - name: Download checksums
        uses: actions/download-artifact@v4
        with:
          name: checksums
          path: checksums/

      - name: Download signatures
        uses: actions/download-artifact@v4
        with:
          name: signed-signatures
          path: signatures/

      - name: Upload to release storage
        run: |
          mkdir -p release-storage
          cp release-isos/**/*.iso release-storage/ || true
          cp checksums/* release-storage/ || true
          cp signatures/**/*.asc release-storage/ || true
          echo "Release artifacts ready:"
          ls -la release-storage/

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: release-storage/
          retention-days: 90

  # ──────────────────────────────────────────────
  # STAGE 12: PUBLISH GITHUB RELEASE
  # ──────────────────────────────────────────────
  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [upload-iso, generate-checksum]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts/

      - name: Generate release tag
        id: tag
        run: |
          TAG="v${{ env.MOON_OS_VERSION }}-$(date +%Y%m%d-%H%M%S)"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Generated tag: $TAG"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Moon OS ${{ env.MOON_OS_CODENAME }} v${{ env.MOON_OS_VERSION }}"
          body: |
            ## Moon OS ${{ env.MOON_OS_CODENAME }} v${{ env.MOON_OS_VERSION }}
            
            ### What's New
            - Custom gaming kernel with PREEMPT_RT, BBR, and low-latency optimizations
            - Automatic hardware detection and driver installation
            - Gaming-optimized desktop environments (COSMIC, GNOME, KDE, Hyprland)
            - Pre-configured gaming stack (Steam, Proton, Wine, Heroic, Lutris)
            - Performance optimizations for CPU, memory, I/O, network, and GPU
            - Full security stack (AppArmor, LUKS2, TPM2, Secure Boot, nftables)
            - Automatic recovery and backup system
            - Support for NVIDIA, AMD, and Intel GPUs
            - Support for laptops, desktops, mini PCs, and gaming handhelds
            
            ### Downloads
            | Architecture | Desktop | Size |
            |-------------|---------|------|
            | x86_64 | COSMIC | ~2.5GB |
            | x86_64 | GNOME | ~2.3GB |
            | aarch64 | COSMIC | ~2.6GB |
            | aarch64 | GNOME | ~2.4GB |
            
            ### Verification
            ```bash
            # Verify SHA256 checksum
            sha256sum -c checksums-sha256.txt
            
            # Verify GPG signature
            gpg --verify moonos-*.iso.asc moonos-*.iso
            ```
            
            ### Documentation
            - [Installation Guide](https://moonos.dev/docs/installation)
            - [Gaming Guide](https://moonos.dev/docs/gaming)
            - [Hardware Support](https://moonos.dev/docs/hardware)
            - [Security Guide](https://moonos.dev/docs/security)
            
            ### Community
            - [Discord](https://discord.gg/moonos)
            - [Reddit](https://reddit.com/r/moonos)
            - [GitHub](https://github.com/moonos/moonos)
          files: |
            release-artifacts/**/*.iso
            release-artifacts/**/*.asc
            release-artifacts/checksums-sha256.txt
            release-artifacts/checksums-sha512.txt
            release-artifacts/checksums-md5.txt
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ──────────────────────────────────────────────
  # STAGE 13: PUBLISH RELEASE NOTES
  # ──────────────────────────────────────────────
  publish-release-notes:
    name: Publish Release Notes
    runs-on: ubuntu-latest
    needs: [publish-release]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate release notes
        run: |
          chmod +x scripts/cli/moonci
          ./scripts/cli/moonci release-notes --version=${{ env.MOON_OS_VERSION }} --output=release-notes.md

      - name: Generate changelog
        run: |
          ./scripts/cli/moonci changelog --version=${{ env.MOON_OS_VERSION }} --output=CHANGELOG.md

      - name: Update release with notes
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.publish-release.outputs.tag_name }}
          body_path: release-notes.md
          append_body: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release notes
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: |
            release-notes.md
            CHANGELOG.md
          retention-days: 365

  # ──────────────────────────────────────────────
  # STAGE 14: PUBLISH DOCUMENTATION
  # ──────────────────────────────────────────────
  publish-docs:
    name: Publish Documentation
    runs-on: ubuntu-latest
    needs: [publish-release]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Build documentation
        run: |
          mkdir -p docs-site
          
          # Copy all documentation
          cp -r docs/* docs-site/ || true
          cp README.md docs-site/ || true
          
          # Generate API documentation if needed
          if [ -d "docs/api" ]; then
            echo "API docs found, including..."
          fi
          
          # Create index page
          cat > docs-site/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <title>Moon OS Documentation</title>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <style>
              body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; }
              h1 { color: #6366f1; }
              a { color: #8b5cf6; }
            </style>
          </head>
          <body>
            <h1>Moon OS Documentation</h1>
            <p>Welcome to the official Moon OS documentation.</p>
            <h2>Guides</h2>
            <ul>
              <li><a href="installation.md">Installation Guide</a></li>
              <li><a href="gaming.md">Gaming Guide</a></li>
              <li><a href="architecture.md">Architecture</a></li>
