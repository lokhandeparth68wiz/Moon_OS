# ============================================================================
# Steam Tweaks
# ============================================================================
steam-tweaks:
  name: Steam Tweaks
  version: "1.0.0"
  description: "Moon OS Steam Optimization Script"
  url: "https://github.com/moonos/steam-tweaks"
  license: "MIT"
  categories: ["gaming"]
  dependencies:
    - steam
    - gamemode
    - mangohud
    - gamescope
  build:
    source: "internal"
    type: "script"
    post_install: |
      # Create Steam optimization script
      mkdir -p /opt/steam-tweaks
      cat > /opt/steam-tweaks/optimize.sh << 'SCRIPT'
      #!/bin/bash
      # Moon OS Steam Optimization Script
      
      echo "Moon OS Steam Optimization"
      echo "========================="
      
      # Enable GameMode
      echo "Enabling GameMode..."
      systemctl --user enable gamemoded.service
      
      # Configure MangoHud
      echo "Configuring MangoHud..."
      mkdir -p ~/.config/MangoHud
      
      # Configure Gamescope
      echo "Configuring Gamescope..."
      mkdir -p ~/.config/gamescope
      
      # Optimize Steam
      echo "Optimizing Steam settings..."
      STEAM_DIR="${HOME}/.steam/steam"
      mkdir -p "$STEAM_DIR/config"
      
      # Add launch options for better performance
      cat > "$STEAM_DIR/config/config.vdf" << 'EOF'
      "install"
      {
          "BaseInstallFolder_1" "~/Games/Steam"
      }
      EOF
      
      echo "Optimization complete!"
      echo "Please restart Steam for changes to take effect."
      SCRIPT
      chmod +x /opt/steam-tweaks/optimize.sh
