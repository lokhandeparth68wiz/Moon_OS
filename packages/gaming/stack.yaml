# ============================================================================
# DXVK
# ============================================================================
dxvk:
  name: DXVK
  version: "2.4"
  description: "A Vulkan-based translation layer for Direct3D 9/10/11"
  url: "https://github.com/doitsujin/dxvk"
  license: "Zlib"
  categories: ["gaming"]
  dependencies:
    - vulkan-icd-loader
    - lib32-vulkan-icd-loader
    - wine
  build:
    source: "https://github.com/doitsujin/dxvk/archive/refs/tags/v2.4.tar.gz"
    type: "tarball"
    configure: |
      ./package-release.sh 2.4 /usr --without-x32 --with-tests
    post_install: |
      # Install DXVK to Wine prefix
      mkdir -p /opt/dxvk
      cp -r build/* /opt/dxvk/

